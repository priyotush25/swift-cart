<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Swift-Cart | shopping</title>

    <!-- Daysi UI -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Tailwind css -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />

    <style>
      .poppins {
        font-family: "Poppins", sans-serif;
        font-weight: 100;
        font-style: normal;
      }
    </style>
  </head>
  <body>
    <!-- Navbar -->
    <section class="bg-base-100 shadow-sm">
      <div class="navbar container mx-auto">
        <div class="navbar-start">
          <div class="dropdown">
            <div tabindex="0" role="button" class="btn btn-ghost lg:hidden">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="h-5 w-5"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M4 6h16M4 12h8m-8 6h16"
                />
              </svg>
            </div>
            <ul
              tabindex="-1"
              class="menu menu-sm dropdown-content bg-base-100 rounded-box z-1 mt-3 w-52 p-2"
            >
              <li><a class="font-medium">Home</a></li>
              <li><a class="font-medium">Product</a></li>
              <li><a class="font-medium">About</a></li>
              <li><a class="font-medium">Contact</a></li>
            </ul>
          </div>
          <a class="font-bold text-xl">SwiftCart</a>
        </div>
        <div class="navbar-center hidden lg:flex">
          <ul class="menu menu-horizontal px-1">
            <li><a class="font-medium">Home</a></li>
            <li><a class="font-medium">Product</a></li>
            <li><a class="font-medium">About</a></li>
            <li><a class="font-medium">Contact</a></li>
          </ul>
        </div>
        <div class="navbar-end">
          <a class="btn">Button</a>
        </div>
      </div>
    </section>

    <!-- Product Section -->
    <section class="mt-20">
      <h1 class="text-5xl font-bold text-center">Our Products</h1>

      <div
        id="container"
        class="flex items-center justify-center gap-4 mt-6"
      ></div>
    </section>

    <!-- script -->
    <script src="./script/index.js"></script>
  </body>
</html>

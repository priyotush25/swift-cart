<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Swift-Cart | shopping</title>

    <!-- tailwind css -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- daysiui -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />

    <link rel="stylesheet" href="/style/style.css" />
  </head>

  <body>
    <!-- Navbar -->
    <section class="shadow-sm bg-base-100">
      <div class="container mx-auto navbar">
        <div class="navbar-start">
          <div class="dropdown">
            <div tabindex="0" role="button" class="btn btn-ghost lg:hidden">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="w-5 h-5"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M4 6h16M4 12h8m-8 6h16"
                />
              </svg>
            </div>
            <ul
              tabindex="-1"
              class="p-2 mt-3 menu menu-sm dropdown-content bg-base-100 rounded-box z-1 w-52"
            >
              <li><a class="font-medium">Home</a></li>
              <li><a class="font-medium">Product</a></li>
              <li><a class="font-medium">About</a></li>
              <li><a class="font-medium">Contact</a></li>
            </ul>
          </div>
          <a class="text-xl font-bold">SwiftCart</a>
        </div>
        <div class="hidden navbar-center lg:flex">
          <ul class="px-1 menu menu-horizontal">
            <li><a class="font-medium">Home</a></li>
            <li><a class="font-medium">Product</a></li>
            <li><a class="font-medium">About</a></li>
            <li><a class="font-medium">Contact</a></li>
          </ul>
        </div>
        <div class="navbar-end">
          <a class="btn btn-outline">Button</a>
        </div>
      </div>
    </section>

    <!-- Product Section -->
    <section class="container mx-auto mt-20">
      <h1 class="text-5xl font-bold text-center">Our Products</h1>

      <div
        id="category-container"
        class="flex flex-wrap items-center justify-center gap-5 mt-6"
      ></div>

      <div
        id="product-container"
        class="grid grid-cols-1 gap-5 mt-10 md:grid-cols-3"
      ></div>
    </section>

    <!-- Footer -->
    <section class="mt-20 bg-neutral-800 text-neutral-50">
      <footer class="container py-10 mx-auto footer sm:footer-horizontal">
        <nav>
          <h6 class="footer-title">Services</h6>
          <a class="link link-hover">Branding</a>
          <a class="link link-hover">Design</a>
          <a class="link link-hover">Marketing</a>
          <a class="link link-hover">Advertisement</a>
        </nav>
        <nav>
          <h6 class="footer-title">Company</h6>
          <a class="link link-hover">About us</a>
          <a class="link link-hover">Contact</a>
          <a class="link link-hover">Jobs</a>
          <a class="link link-hover">Press kit</a>
        </nav>
        <nav>
          <h6 class="footer-title">Legal</h6>
          <a class="link link-hover">Terms of use</a>
          <a class="link link-hover">Privacy policy</a>
          <a class="link link-hover">Cookie policy</a>
        </nav>
        <form>
          <h6 class="footer-title">Newsletter</h6>
          <fieldset class="w-80">
            <label>Enter your email address</label>
            <div class="join">
              <input
                type="text"
                placeholder="username@site.com"
                class="input input-bordered join-item"
              />
              <button class="btn btn-primary join-item">Subscribe</button>
            </div>
          </fieldset>
        </form>
      </footer>
    </section>

    <!-- script -->
    <script src="./script/index.js"></script>
  </body>
</html>
